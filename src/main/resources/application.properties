spring.application.name=cinephiles
server.address=0.0.0.0
server.port=${SERVER_PORT:9000}

#cashfree integration
cashfree.client.id=${CASHFREE_CLIENT_ID}
cashfree.client.secret=${CASHFREE_CLIENT_SECRET}
cashfree.api.url=${CASHFREE_CLIENT_API_URL}
frontend.return.url=${FRONTEND_URL:http://192.168.43.128:5173}

spring.datasource.url=${DATASOURCE_URL}
spring.datasource.username=${DATASOURCE_USER}
spring.datasource.password=${DATASOURCE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hikari Connection Pool Optimizations for Supabase
spring.datasource.hikari.auto-commit=true
spring.datasource.hikari.maximum-pool-size=40
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1800000

